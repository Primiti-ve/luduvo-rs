name: cargo qa

on:
  push:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  qa:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: build
        run: cargo build --verbose

      - name: run tests
        run: cargo test --verbose

      - name: clippy
        run: cargo clippy --verbose
