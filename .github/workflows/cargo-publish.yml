name: cargo publish

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: build
      run: cargo build --verbose
    
    - name: run tests
      run: cargo test --verbose
    
    - name: clippy
      run: cargo clippy --verbose
    
    - name: publish
      run: cargo publish --verbose
