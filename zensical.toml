[project]
site_name = "luduvo-rs"
site_description = "a rust library designed for interacting with the luduvo api"
site_author = "primiti_ve"
site_url = "https://primiti-ve.github.io/luduvo-rs/"
copyright = """
  copyright &copy; 2026 primiti_ve –
  <a href="#__consent">change cookie settings</a>
"""
docs_dir = "docs"

repo_url = "https://github.com/Primiti-ve/luduvo-rs"
repo_name = "luduvo-rs"

nav = [
  { "home" = [
      "index.md",
      "quick-start.md",
      "features.md",
      "contributors.md",
      "need-help.md"
  ] },

  { "tutorials" = [
      { "tutorials" = "tutorials/index.md" },

      { "users" = [
          "tutorials/users/profile.md",
          "tutorials/users/friends.md",
          "tutorials/users/query.md"
      ] },

      { "ungrouped" = [
          "tutorials/ungrouped/places.md",
          "tutorials/ungrouped/prelude.md",
      ] },
  ] },

  { "api reference" = [
      { "users" = [
          "api/users/index.md",
          "api/users/profile.md",
          "api/users/friends.md",
          "api/users/query.md"
      ] },

      { "ungrouped" = [
          "api/ungrouped/index.md",
          "api/ungrouped/places.md",
      ] },
  ] }
]

# ----------------------------------------------------------------------------
# cookie consent
# ----------------------------------------------------------------------------
[project.extra.consent]
title = "cookies!"
description = """
    we use cookies (unfortunately, not chocolate chip) to recognize your
    repeated visits and preferences, as well as to measure the effectiveness
    of our documentation and whether users find what they're searching for.
    with your consent, you'll help us make our documentation better! :heart:
"""
actions = [
    "accept",
    "reject",
    "manage"
]

# ----------------------------------------------------------------------------
# section for configuring theme options
# ----------------------------------------------------------------------------
[project.theme]
favicon = "https://raw.githubusercontent.com/Primiti-ve/luduvo-rs/refs/heads/main/gh-assets/logo.png"
language = "en"
features = [
    "announce.dismiss",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.indexes",
    "navigation.path",
    "navigation.prune",
    "navigation.top",
    "navigation.tracking",
    "navigation.tabs",
    "search.highlight",
    "toc.integrate"
]
logo = "https://raw.githubusercontent.com/Primiti-ve/luduvo-rs/refs/heads/main/gh-assets/logo.png"

[project.theme.font]
text = "Inter"
code = "Jetbrains Mono"

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/Primiti-ve/luduvo-rs"

# ----------------------------------------------------------------------------
# codeblocks
# ----------------------------------------------------------------------------
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]

# ----------------------------------------------------------------------------
# tasklists
# ----------------------------------------------------------------------------
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

# ----------------------------------------------------------------------------
# admonitions
# ----------------------------------------------------------------------------
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]

# ----------------------------------------------------------------------------
# grids
# ----------------------------------------------------------------------------
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]

# ----------------------------------------------------------------------------
# icons/emojis
# ----------------------------------------------------------------------------
[project.markdown_extensions.pymdownx.emoji]

# ----------------------------------------------------------------------------
# offline usage
# ----------------------------------------------------------------------------
[project.plugins.offline]
